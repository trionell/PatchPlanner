name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Backend checks (go vet, go test)
        working-directory: backend
        run: |
          go vet ./...
          go test ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend checks (typecheck, lint, test)
        working-directory: frontend
        run: |
          npm run typecheck
          npm run lint
          npm run test

      - name: Build (make build)
        run: make build

      - name: Set up SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Transfer binary and migrations to the VPS
        env:
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            "rm -rf /opt/patchplanner/incoming && mkdir -p /opt/patchplanner/incoming"
          scp -i ~/.ssh/id_ed25519 backend/patchplanner \
            "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST:/opt/patchplanner/incoming/patchplanner"
          scp -i ~/.ssh/id_ed25519 -r backend/migrations \
            "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST:/opt/patchplanner/incoming/migrations"

      - name: Run remote deploy script
        env:
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            "/opt/patchplanner/deploy.sh /opt/patchplanner/incoming"
